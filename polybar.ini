include-file = color

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0

[bar/main]
monitor = DisplayPort-1
width = 2554
height = 24
offset-x = 3
offset-y = 3
padding-right = 1
module-margin = 1
modules-left = bspwm xwindow
modules-center =
modules-right = xkeyboard net memory cpu tempCPU date tray
font-0 = Sarasa UI J:size=10;3
font-1 = Symbols Nerd Font Mono:size=10;3
background = ${color.background}
foreground = ${color.foreground}
border-size = 1
border-color = ${color.fg-bright}
wm-restack = bspwm
scroll-up = bspwm-desknext
scroll-down = bspwm-deskprev

[bar/secondary]
monitor = HDMI-A-0
width = 1914
height = 24
offset-x = 3
offset-y = 3
padding-right = 1
module-margin = 1
modules-left = bspwm
modules-center = mpd
modules-right = xkeyboard net memory cpu tempCPU date
font-0 = Sarasa UI J:size=10;3
font-1 = Symbols Nerd Font Mono:size=10;3
background = ${color.background}
foreground = ${color.foreground}
border-size = 1
border-color = ${color.fg-bright}
wm-restack = bspwm
scroll-up = bspwm-desknext
scroll-down = bspwm-deskprev

[module/bspwm]
type = internal/bspwm
ws-icon-0 = 0;ńŞÇ
ws-icon-1 = 1;ń║î
ws-icon-2 = 2;ńŞë
ws-icon-3 = 3;ňŤŤ
ws-icon-4 = 4;ń║ö
ws-icon-5 = 5;ňůş
ws-icon-6 = 6;ńŞâ
ws-icon-7 = 7;ňůź
ws-icon-8 = 8;ń╣Ł
ws-icon-9 = 9;ňŹü
ws-icon-10 = 10;ńŞÇ
ws-icon-11 = 11;ń║î
ws-icon-12 = 12;ńŞë
ws-icon-13 = 13;ňŤŤ
ws-icon-14 = 14;ń║ö
ws-icon-15 = 15;ňůş
ws-icon-16 = 16;ńŞâ
ws-icon-17 = 17;ňůź
ws-icon-18 = 18;ń╣Ł
ws-icon-19 = 19;ňŹü
format = <label-state>
label-focused = %icon%
label-focused-background = #444
label-focused-padding = 2
label-occupied = %icon%
label-occupied-padding = 2
label-marked = %icon%+
label-marked-background = ${color.blue}
label-makred-padding = 2
label-urgent = %icon%!
label-urgent-background = ${color.green}
label-urgent-padding = 2
label-empty =

[module/xwindow]
type = internal/xwindow
label = %title:0:150:ÔÇŽ%

[module/tray]
type = internal/tray
tray-padding = 1

[module/mpd]
type = internal/mpd
icon-prev = ´üł
icon-play = ´üő
icon-pause = ´üî
icon-next = ´üĹ
label-song-maxlen = 45
label-song-ellipsis = true
format-online = <label-song> <toggle><icon-prev><icon-next>

[module/net]
type = internal/network
interface-type = wired
format-connected-prefix = "ˇ░▒Ž "
format-connected-prefix-foreground = ${color.fg-bright}
label-connected = %netspeed%
format-disconnected =

[module/memory]
type = internal/memory
interval = 3
format-prefix = "ţ┐ů "
format-prefix-foreground = ${color.fg-bright}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "´ĺ╝ "
format-prefix-foreground = ${color.fg-bright}
label = %percentage%%

[module/tempCPU]
type = internal/temperature
interval = 2
hwmon-path = /sys/devices/pci0000:00/0000:00:18.3/hwmon/hwmon2/temp1_input
warn-temperature = 85
format-prefix = "ˇ░Ćł "
format-warn-prefix = "ˇ░Ćł "
format-prefix-foreground = ${color.fg-bright}
format-warn-prefix-foreground = ${color.fg-bright}
label-warn-foreground = ${color.red}

[module/date]
type = internal/date
interval = 10
date =
date-alt = " %d-%m-%Y"
time = %H:%M
time-alt = %H:%M
format-prefix = ´ÇŚ
format-prefix-foreground = ${color.fg-bright}
label = %date% %time%

[module/xkeyboard]
type = internal/xkeyboard
format = <label-layout>
format-prefix = "´äť "
format-prefix-foreground = ${color.fg-bright}
