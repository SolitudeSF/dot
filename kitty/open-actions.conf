protocol file
fragment_matches [0-9]+
action launch --type=tab --cwd=last_reported kak +${FRAGMENT} ${FILE_PATH}

protocol file
mime text/*, application/javascript, application/x-ndjson
action launch --type=tab --cwd=last_reported ${EDITOR} ${FILE_PATH}

protocol file
mime application/json
action launch --type=tab jless ${FILE_PATH}

protocol file
action launch --type=background --cwd=last_reported app2unit-open-service ${FILE_PATH}
