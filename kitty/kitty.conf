include colors.conf

font_size 14.0

scrollback_lines 1000
scrollback_pager_history_size 10
scrollback_pager kak -e "exec CURSOR_LINEg"

strip_trailing_spaces smart
select_by_word_characters :@-./_~?&=%+#

shell_integration enabled no-rc
notify_on_cmd_finish invisible
shell elvish

mouse_hide_wait 0
focus_follows_mouse yes

remember_window_size no

allow_remote_control yes
listen_on unix:${XDG_RUNTIME_DIR}/kitty
clipboard_control write-clipboard write-primary read-clipboard read-primary

env LESSHISTFILE=-

# window_border_width 1

tab_bar_style separator

active_tab_font_style bold-italic
inactive_tab_font_style normal

url_style double

background_opacity 0.9

cursor_shape beam
cursor_trail 49
cursor_trail_decay 0.05 0.2

map kitty_mod+f9       clear_terminal reset active
map kitty_mod+f10      clear_terminal clear active
map kitty_mod+f11      clear_terminal scrollback active

# Clipboard
map kitty_mod+c        copy_to_clipboard
map kitty_mod+v        paste_from_clipboard
map shift+insert       paste_from_selection

# Scrolling
map kitty_mod+up        scroll_line_up
map kitty_mod+down      scroll_line_down
map kitty_mod+k         scroll_line_up
map kitty_mod+j         scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+h         show_scrollback

map kitty_mod+z         scroll_to_prompt -1
map kitty_mod+x         scroll_to_prompt 1

# Window management
map kitty_mod+enter    new_window
map kitty_mod+w        close_window
map kitty_mod+]        next_window
map kitty_mod+[        previous_window
map kitty_mod+f        move_window_forward
map kitty_mod+b        move_window_backward
map kitty_mod+`        move_window_to_top
map kitty_mod+1        first_window
map kitty_mod+2        second_window
map kitty_mod+3        third_window
map kitty_mod+4        fourth_window
map kitty_mod+5        fifth_window
map kitty_mod+6        sixth_window
map kitty_mod+7        seventh_window
map kitty_mod+8        eighth_window
map kitty_mod+9        ninth_window
map kitty_mod+0        tenth_window

# Tab management
map kitty_mod+right    next_tab
map kitty_mod+left     previous_tab
map kitty_mod+t        launch --type=tab --cwd=last_reported
map kitty_mod+q        close_tab
map kitty_mod+alt+l    next_layout
map kitty_mod+.        move_tab_forward
map kitty_mod+,        move_tab_backward

# Font sizes
# all | current
map kitty_mod+equal    change_font_size all +2.0
map kitty_mod+minus    change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0
map kitty_mod+alt+equal    change_font_size current +2.0
map kitty_mod+alt+minus    change_font_size current -2.0
map kitty_mod+alt+backspace change_font_size current 0

# Kittens
# Open a currently visible URL using the keyboard. The program used to open the
# URL is specified in open_url_with.
map kitty_mod+e         kitten hints
# Select a path/filename and insert it into the terminal.
map kitty_mod+p>f       kitten hints --type=path --program=-
# Select a path/filename and open it with the default open program.
map kitty_mod+p>shift+f kitten hints --type=path
# Select a line of text and insert it into the terminal.
map kitty_mod+p>l       kitten hints --type=line --program=-
# Select words and insert into terminal.
map kitty_mod+p>w       kitten hints --type=word --program=-
# Open selected file at the selected line
map kitty_mod+p>n       kitten hints --type=linenum --linenum-action=tab kak +{line} {path}

map ctrl+f1 create_marker
map shift+f1 remove_marker
map kitty_mod+n scroll_to_mark next

map alt+f1 toggle_window_title_bars
map kitty_mod+u        input_unicode_character

map kitty_mod+escape   kitty_shell overlay
map kitty_mod+a>m set_background_opacity +0.1
map kitty_mod+a>l set_background_opacity -0.1
map kitty_mod+a>1 set_background_opacity 1
map kitty_mod+a>d set_background_opacity default

map ctrl+alt+enter launch --type=os-window --cwd=last_reported
map kitty_mod+f1   launch --type=overlay --stdin-source=@alternate_scrollback --stdin-add-formatting kak
map kitty_mod+g    launch --type=overlay --cwd=last_reported gitui
map kitty_mod+l    launch --type=overlay --stdin-source=@last_cmd_output --stdin-add-formatting kak
map kitty_mod+alt+l launch --type=overlay --stdin-source=@first_cmd_output_on_screen --stdin-add-formatting kak

mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map kitty_mod+left release grabbed,ungrabbed mouse_handle_click link
mouse_map right press ungrabbed mouse_select_command_output

symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono
