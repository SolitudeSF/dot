[init]
	defaultBranch = master
[user]
	email = solitudesf@protonmail.com
	name = SolitudeSF
	signingkey = 789B06817C385387
[core]
	pager = /usr/bin/delta
[interactive]
	diffFilter = /usr/bin/delta --color-only
[delta]
	hyperlinks = true
	hyperlinks-file-link-format = "file://{path}#{line}"
	navigate = true
	light = false
[alias]
	tags = tag -l
	branches = branch -a
	diffdir = difftool --dir-diff
[color]
	ui = auto
[pull]
	rebase = true
[commit]
	gpgsign = true
[credential]
	helper = store
[diff]
	colorMoved = default
	tool = kitty
	guitool = kitty.gui
[difftool]
	prompt = false
	trustExitCode = true
[difftool "kitty"]
	cmd = kitten diff $LOCAL $REMOTE
[difftool "kitty.gui"]
	cmd = kitty kitten diff $LOCAL $REMOTE
[merge]
	conflictstyle = diff3
	tool = kakmerge
[mergetool]
	trustExitCode = true
[mergetool "kakmerge"]
	cmd = "env LOCAL="${LOCAL}" BASE="${BASE}" REMOTE="${REMOTE}" MERGED="${MERGED}" kakmerge"
[filter "lfs"]
	required = true
	clean = git-lfs clean -- %f
	smudge = git-lfs smudge -- %f
	process = git-lfs filter-process
